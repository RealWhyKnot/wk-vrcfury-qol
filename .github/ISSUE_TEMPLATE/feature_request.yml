name: Feature request
description: Suggest an idea for this project.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest an improvement. Skim the [wiki](https://github.com/RealWhyKnot/wk-vrcfury-qol/wiki) first to check whether the behaviour you want already exists or has been considered.

  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Is your feature request related to a problem? Describe the avatar workflow you're stuck on.
      placeholder: e.g. "When refactoring my avatar I need to ... and there's no fast way to do it without ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: A clear description of what you want to happen. If you can sketch the UI ("right-click ___ to get ___"), do.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you have tried.

  - type: textarea
    id: extra-context
    attributes:
      label: Additional context
      description: Screenshots, links to similar features in other tools, references -- anything that helps.
