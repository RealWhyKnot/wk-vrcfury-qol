name: CI

# Light CI for a Unity-package-source repo. We don't run Unity itself here
# (heavy, requires a license, slow) -- that's tracked as a follow-up issue.
# What we DO check: workflow YAML is valid (actionlint) and Markdown is lintable.

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'wiki/**'
      - '*.md'
      - 'LICENSE'
  push:
    branches: [main]
    paths-ignore:
      - 'wiki/**'
      - '*.md'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint (workflows)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Test changelog release notes
        shell: pwsh
        run: ./.github/scripts/Test-UpdateChangelogNotes.ps1
      - name: Run actionlint
        uses: raven-actions/actionlint@v2
